name = "omni-profiling"
main = "src/index.ts"
compatibility_date = "2025-05-01"

# D1 binding. Create the DB with `wrangler d1 create omni-profiling`,
# then paste the returned database_id below (replace the placeholder).
[[d1_databases]]
binding = "DB"
database_name = "omni-profiling"
database_id = "27ee8e5e-6c69-4274-962b-b41bd40c629f"

# Route: map ONLY the exact /omni/profiling endpoint to this worker. Do NOT use a "*" suffix:
# "hanxiao.io/omni/profiling*" also matches /omni/profiling-v1.zip and /omni/profiling-v1.json
# (the dataset + manifest served by GitHub Pages), which the worker then 404s. The exact pattern
# leaves those static assets to Pages while still capturing the GET/POST API path.
[[routes]]
pattern = "hanxiao.io/omni/profiling"
zone_id = "095d0733042e0d76d9cd92ebd3425544"
