name: Release

# Builds the app, packages a DMG, and publishes a GitHub release on every push to main.
# Doc-only pushes are skipped. Rapid pushes collapse to the latest commit.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'dist/**'
      - '.gitignore'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

concurrency:
  group: release
  cancel-in-progress: true   # a burst of pushes only releases the latest

permissions:
  contents: write   # GITHUB_TOKEN needs this to create the tag + release

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # Auto-bump the patch on every release: x.y.z -> x.y.(z+1). This runs before xcodegen so the
      # build, the About panel, the DMG name, and the release tag all use the new version. The
      # bumped project.yml is committed back to main later with [skip ci] so it does not re-trigger.
      - name: Bump patch version
        id: ver
        run: |
          CUR=$(grep -m1 'MARKETING_VERSION' project.yml | sed -E 's/.*"([^"]+)".*/\1/')
          MAJ=${CUR%%.*}; REST=${CUR#*.}; MIN=${REST%%.*}; PAT=${REST##*.}
          NEW="${MAJ}.${MIN}.$((PAT+1))"
          sed -i '' -E "s/(MARKETING_VERSION: *)\"[^\"]+\"/\1\"${NEW}\"/" project.yml
          echo "bumped $CUR -> $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      # The app needs Xcode 26 (Swift 6.2 + the swift-tokenizers SE-0482 artifact).
      - name: Select newest Xcode 26
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          [ -n "$XC" ] || XC=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Using $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      # MLX-Swift compiles Metal shaders; Xcode 26 needs the Metal toolchain component.
      - name: Install Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      # The .xcodeproj is generated from project.yml (gitignored), so regenerate it on CI.
      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      # Import the Developer ID Application cert (base64 .p12 in a secret) into an ephemeral
      # keychain so codesign can use it, then forget it at job end.
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KC=build.keychain; KP=ci-temp-pass
          echo "$DEVELOPER_ID_P12" | base64 --decode > /tmp/devid.p12
          security create-keychain -p "$KP" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KP" "$KC"
          security import /tmp/devid.p12 -k "$KC" -P "$DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KC" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KC" >/dev/null
          rm -f /tmp/devid.p12
          security find-identity -v -p codesigning "$KC" | grep "Developer ID Application"

      - name: Build (Developer ID signed)
        run: |
          ./Scripts/build-app.sh Release \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=MTECXQ97E6 \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER= \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS=--timestamp

      # Store notary credentials under the "omni-notary" profile, then notarize + staple the app
      # and the (signed) DMG via the same script used locally.
      - name: Notarize and package DMG
        env:
          AC_APPLE_ID: ${{ secrets.AC_APPLE_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials omni-notary \
            --apple-id "$AC_APPLE_ID" --team-id MTECXQ97E6 --password "$AC_PASSWORD"
          ./Scripts/notarize.sh omni-notary \
            .build/xcode-rel/Build/Products/Release/Omni.app "${{ steps.ver.outputs.version }}"

      # Persist the bumped version back to main, so the next push bumps from here. [skip ci] keeps
      # this commit from re-triggering the release workflow (no infinite loop).
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project.yml
          git commit -m "chore: release v${{ steps.ver.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            "dist/Omni-${{ steps.ver.outputs.version }}.dmg" \
            --target "$(git rev-parse HEAD)" \
            --title "Omni ${{ steps.ver.outputs.version }}" \
            --notes "Automated, Apple-notarized build from \`${{ github.sha }}\`.

          ## Install
          Open the DMG and drag **Omni** onto **Applications**. No Gatekeeper prompt - the build is notarized.

          ## Requirements
          - Apple Silicon Mac (M1 or later), macOS 14+.
          - First launch downloads the on-device search model (~1.9 GB), then runs offline."

      # Refresh hanxiao.io/omni: copy the new DMG and stamp the version into the download buttons,
      # on both the deployed Pages repo (live now) and the blog source (keeps it consistent).
      # omni/ is a static page, so this is a direct file swap - no hexo build needed.
      # Requires a SITE_TOKEN secret (PAT with contents:write on hanxiao.github.io + blog).
      # Skips cleanly if the secret is absent, so a release never fails on this.
      - name: Update hanxiao.io/omni download page
        env:
          SITE_TOKEN: ${{ secrets.SITE_TOKEN }}
          VER: ${{ steps.ver.outputs.tag }}
          DMG: dist/Omni-${{ steps.ver.outputs.version }}.dmg
        run: |
          if [ -z "$SITE_TOKEN" ]; then echo "no SITE_TOKEN secret; skipping site update"; exit 0; fi
          git config --global user.email "omni-ci@users.noreply.github.com"
          git config --global user.name "omni-ci"
          stamp() { sed -i '' "s#<span class=\"dl-ver\">v[0-9.]*</span>#<span class=\"dl-ver\">${VER}</span>#g" "$1"; }
          # Self-healing deploy: the page (index.html + all assets) is owned by this repo's
          # site/omni/ and pushed in full every release, so a dropped asset or an outside clobber
          # is repaired on the next release. The DMG is the only thing CI adds on top.
          git clone --depth 1 "https://x-access-token:${SITE_TOKEN}@github.com/hanxiao/hanxiao.github.io.git" /tmp/site
          rsync -a --delete --exclude='Omni.dmg' site/omni/ /tmp/site/omni/
          cp "$DMG" /tmp/site/omni/Omni.dmg
          stamp /tmp/site/omni/index.html
          ( cd /tmp/site && git add omni && (git diff --cached --quiet || (git commit -m "omni: ${VER}" && git push)) )
          echo "updated hanxiao.io/omni to ${VER}"
