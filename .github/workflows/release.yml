name: Release

# Builds the app, packages a DMG, and publishes a GitHub release. Runs ON DEMAND (not on every
# push) on a SELF-HOSTED macOS runner - so routine commits cost nothing and macOS builds don't burn
# GitHub's 10x-metered minutes on a private repo. Release with: gh workflow run release.yml
# (or the Actions "Run workflow" button).
on:
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: true   # a burst of pushes only releases the latest

permissions:
  contents: write   # GITHUB_TOKEN needs this to create the tag + release

jobs:
  release:
    # Self-hosted macOS runner (the M3 Ultra dev box, macOS 26). Free + fast, and macOS 26 is
    # required anyway: rendering the Liquid Glass AppIcon.icon needs the Tahoe runtime frameworks
    # (actool crashes on macOS 15 with "FigBaseCALayer missing from MediaToolbox").
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, so the release notes can diff against the previous tag

      # Auto-bump the patch on every release: x.y.z -> x.y.(z+1). This runs before xcodegen so the
      # build, the About panel, the DMG name, and the release tag all use the new version. The
      # bumped project.yml is committed back to main later with [skip ci] so it does not re-trigger.
      - name: Bump patch version
        id: ver
        run: |
          CUR=$(grep -m1 'MARKETING_VERSION' project.yml | sed -E 's/.*"([^"]+)".*/\1/')
          MAJ=${CUR%%.*}; REST=${CUR#*.}; MIN=${REST%%.*}; PAT=${REST##*.}
          NEW="${MAJ}.${MIN}.$((PAT+1))"
          sed -i '' -E "s/(MARKETING_VERSION: *)\"[^\"]+\"/\1\"${NEW}\"/" project.yml
          echo "bumped $CUR -> $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      # The app needs Xcode 26 (Swift 6.2 + the swift-tokenizers SE-0482 artifact). Select it via
      # DEVELOPER_DIR (written to the job env) instead of `sudo xcode-select` - the self-hosted
      # runner has no passwordless sudo. Falls back to the active toolchain if no Xcode_* is found
      # (the dev box's default is already Xcode 26).
      - name: Select Xcode 26
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          [ -n "$XC" ] || XC=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$XC" ]; then echo "DEVELOPER_DIR=$XC/Contents/Developer" >> "$GITHUB_ENV"; echo "Using $XC"; fi
          xcodebuild -version

      # MLX-Swift compiles Metal shaders; Xcode 26 needs the Metal toolchain component.
      - name: Install Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      # The .xcodeproj is generated from project.yml (gitignored), so regenerate it on CI.
      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      # Import the Developer ID Application cert (base64 .p12 in a secret) into an ephemeral
      # keychain so codesign can use it, then forget it at job end.
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KC=build.keychain; KP=ci-temp-pass
          echo "$DEVELOPER_ID_P12" | base64 --decode > /tmp/devid.p12
          security create-keychain -p "$KP" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KP" "$KC"
          security import /tmp/devid.p12 -k "$KC" -P "$DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KC" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KC" >/dev/null
          rm -f /tmp/devid.p12
          security find-identity -v -p codesigning "$KC" | grep "Developer ID Application"

      - name: Build (Developer ID signed)
        run: |
          ./Scripts/build-app.sh Release \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER= \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS=--timestamp

      # Notarize + staple the app and the (signed) DMG. notarize.sh takes the App Store Connect
      # creds directly from the env (no keychain profile) so it works on the self-hosted runner,
      # whose login keychain isn't unlocked for the LaunchAgent.
      - name: Notarize and package DMG
        env:
          AC_APPLE_ID: ${{ secrets.AC_APPLE_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
          AC_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ./Scripts/notarize.sh omni-notary \
            .build/xcode-rel/Build/Products/Release/Omni.app "${{ steps.ver.outputs.version }}"

      # Persist the bumped version back to main, so the next push bumps from here. [skip ci] keeps
      # this commit from re-triggering the release workflow (no infinite loop).
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project.yml
          git commit -m "chore: release v${{ steps.ver.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Changelog = the commit subjects since the previous release tag (the new tag is created by
          # this step, so the highest existing tag is the previous release). Drop the auto version-bump
          # commit and merges. Written to a file so commit messages with quotes/backticks can't break
          # the notes.
          PREV=$(git tag -l 'v*' --sort=-version:refname | head -n1)
          if [ -n "$PREV" ]; then
            CHANGES=$(git log --no-merges --pretty='- %s' "${PREV}..HEAD" \
              | grep -vE '\[skip ci\]|^- chore: release|^- Merge ' || true)
          fi
          [ -z "$CHANGES" ] && CHANGES="- Maintenance and internal improvements."
          {
            echo "## What's changed since ${PREV:-the previous release}"
            echo "$CHANGES"
            echo ""
            echo "## Install"
            echo "Open the DMG and drag **Omni** onto **Applications**. No Gatekeeper prompt - the build is notarized."
            echo ""
            echo "## Requirements"
            echo "- Apple Silicon Mac (M1 or later), macOS 14+."
            echo "- First launch downloads the on-device search model (~1.9 GB), then runs offline."
          } > /tmp/release-notes.md
          gh release create "${{ steps.ver.outputs.tag }}" \
            "dist/Omni-${{ steps.ver.outputs.version }}.dmg" \
            --target "$(git rev-parse HEAD)" \
            --title "Omni ${{ steps.ver.outputs.version }}" \
            --notes-file /tmp/release-notes.md

      # Refresh hanxiao.io/omni: copy the new DMG and stamp the version into the download buttons,
      # on both the deployed Pages repo (live now) and the blog source (keeps it consistent).
      # omni/ is a static page, so this is a direct file swap - no hexo build needed.
      # Requires a SITE_TOKEN secret (PAT with contents:write on hanxiao.github.io + blog).
      # Skips cleanly if the secret is absent, so a release never fails on this.
      - name: Update hanxiao.io/omni download page
        env:
          SITE_TOKEN: ${{ secrets.SITE_TOKEN }}
          VER: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          DMG: dist/Omni-${{ steps.ver.outputs.version }}.dmg
        run: |
          if [ -z "$SITE_TOKEN" ]; then echo "no SITE_TOKEN secret; skipping site update"; exit 0; fi
          git config --global user.email "omni-ci@users.noreply.github.com"
          git config --global user.name "omni-ci"
          MD5=$(md5 -q "$DMG")
          # The DMG ships under a VERSIONED filename (Omni-<version>.dmg). Each release is therefore a
          # brand-new URL Cloudflare has never cached, so a download can never serve a stale binary -
          # which the old fixed Omni.dmg name did (CF caches the binary on a long TTL). The page stamps
          # the version pill, every download href, and the MD5 (so users can verify the download).
          stamp() {
            sed -i '' "s#<span class=\"dl-ver\">v[0-9.]*</span>#<span class=\"dl-ver\">${VER}</span>#g" "$1"
            sed -i '' "s#href=\"Omni[^\"]*\.dmg\"#href=\"Omni-${VERSION}.dmg\"#g" "$1"
            sed -i '' "s#<span class=\"dl-md5\">[^<]*</span>#<span class=\"dl-md5\">${MD5}</span>#g" "$1"
          }
          # Self-healing deploy: the page (index.html + all assets) is owned by this repo's site/omni/
          # and pushed in full every release, so a dropped asset or an outside clobber self-repairs.
          rm -rf /tmp/site   # self-hosted runner reuses /tmp; a prior run's clone would block this one
          git clone --depth 1 "https://x-access-token:${SITE_TOKEN}@github.com/hanxiao/hanxiao.github.io.git" /tmp/site
          rsync -a --delete --exclude='*.dmg' --exclude='profiling-v1.*' site/omni/ /tmp/site/omni/
          cp "$DMG" "/tmp/site/omni/Omni-${VERSION}.dmg"
          # Keep the 2 most recent DMGs (current + previous). The page HTML is at the fixed /omni/
          # URL and can be CF-cached (max-age=14400) briefly after a release; keeping the previous
          # version's DMG means a momentarily-stale page still links a real file instead of 404ing.
          ( cd /tmp/site/omni && ls -t Omni-*.dmg 2>/dev/null | tail -n +3 | xargs rm -f 2>/dev/null || true )
          # Manifest the in-app updater ("Check for Updates") reads to detect new versions.
          printf '{"version":"%s","url":"https://hanxiao.io/omni/Omni-%s.dmg","md5":"%s"}\n' \
            "$VERSION" "$VERSION" "$MD5" > /tmp/site/omni/latest.json
          stamp /tmp/site/omni/index.html
          ( cd /tmp/site && git add -A omni && (git diff --cached --quiet || (git commit -m "omni: ${VER} (md5 ${MD5})" && git push)) )
          echo "updated hanxiao.io/omni to ${VER}, dmg Omni-${VERSION}.dmg md5 ${MD5}"

      - name: Purge Cloudflare cache for /omni
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "no Cloudflare secrets; skipping purge (page is updated at origin, CF will catch up on TTL)"; exit 0
          fi
          # Surgical purge of just the /omni URLs (GitHub Pages origin is already updated above).
          # Without this, Cloudflare serves the stale cached HTML/DMG until TTL expiry, making a
          # release look like it never landed. Blog deploys purge_everything; this only touches omni.
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" \
            --data '{"files":["https://hanxiao.io/omni/","https://hanxiao.io/omni/index.html","https://hanxiao.io/omni/Omni.dmg"]}' \
            && echo "purged Cloudflare cache for /omni" || echo "Cloudflare purge failed (non-fatal)"

      # Self-hosted hygiene: the cert import adds a temp build.keychain to the user search list -
      # restore it and remove the temp keychain so repeated builds don't pollute the dev machine.
      - name: Clean up keychain
        if: always()
        run: |
          security list-keychains -d user -s login.keychain-db || true
          security delete-keychain build.keychain 2>/dev/null || true
