name: Deploy site

# Deploy ONLY the static hanxiao.io/omni page (index.html + assets) - no app build, no version bump.
# Use after editing site/omni/ (homepage copy, benchmark viz, icon, og-image). The full release
# workflow also deploys the site; this is the lightweight path for site-only changes.
#
#   gh workflow run deploy-site.yml
on:
  workflow_dispatch: {}

concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    # Self-hosted (the dev Mac) - free, and BSD sed matches the release workflow's stamp.
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Deploy site/omni
        env:
          SITE_TOKEN: ${{ secrets.SITE_TOKEN }}
        run: |
          if [ -z "$SITE_TOKEN" ]; then echo "no SITE_TOKEN secret; cannot deploy"; exit 1; fi
          git config --global user.email "omni-ci@users.noreply.github.com"
          git config --global user.name "omni-ci"
          rm -rf /tmp/site-only   # self-hosted runner reuses /tmp; a prior clone would block this one
          git clone --depth 1 "https://x-access-token:${SITE_TOKEN}@github.com/hanxiao/hanxiao.github.io.git" /tmp/site-only

          # Stage the omni/ subtree onto the current target tree: rsync the page + assets (PRESERVING
          # the release-managed files - DMGs, the in-app updater manifest, the profiling dataset; the
          # scoped --delete still prunes stale page assets), then re-stamp the download metadata from
          # the live manifest. Fully idempotent, so it can be re-run on a fresh tip during a push race.
          stage_omni() {
            rsync -a --delete --exclude='*.dmg' --exclude='profiling-v*' --exclude='latest.json' \
              "$GITHUB_WORKSPACE/site/omni/" /tmp/site-only/omni/
            MANIFEST=/tmp/site-only/omni/latest.json
            if [ -f "$MANIFEST" ]; then
              VERSION=$(python3 -c "import json;print(json.load(open('$MANIFEST'))['version'])")
              MD5=$(python3 -c "import json;print(json.load(open('$MANIFEST'))['md5'])")
              sed -i '' "s#<span class=\"dl-ver\">v[0-9.]*</span>#<span class=\"dl-ver\">v${VERSION}</span>#g" /tmp/site-only/omni/index.html
              sed -i '' "s#href=\"Omni[^\"]*\.dmg\"#href=\"Omni-${VERSION}.dmg\"#g" /tmp/site-only/omni/index.html
              sed -i '' "s#<span class=\"dl-md5\">[^<]*</span>#<span class=\"dl-md5\">${MD5}</span>#g" /tmp/site-only/omni/index.html
              echo "stamped download to v${VERSION} (md5 ${MD5})"
            else
              echo "WARNING: no latest.json on target; deploying page with placeholder download metadata"
            fi
            git -C /tmp/site-only add -A omni
          }

          # Push with rebase-on-race: the blog CI publishes to the SAME repo (root, keep_files), so a
          # concurrent push can make ours non-fast-forward. On rejection, hard-reset to the new remote
          # tip and re-stage - our commit only touches omni/, so it re-applies onto the blog's root
          # changes cleanly (reset+reapply, not rebase, so no shallow-clone merge-base needed). Bounded.
          for attempt in 1 2 3 4 5; do
            git -C /tmp/site-only fetch --quiet origin master
            git -C /tmp/site-only reset --hard --quiet FETCH_HEAD
            stage_omni
            if git -C /tmp/site-only diff --cached --quiet; then echo "no site changes"; break; fi
            git -C /tmp/site-only commit -q -m "omni site: deploy ${GITHUB_SHA::7}"
            if git -C /tmp/site-only push origin HEAD:master; then echo "deployed (attempt $attempt)"; break; fi
            if [ "$attempt" = "5" ]; then echo "push still racing after 5 attempts; failing"; exit 1; fi
            echo "push race detected; refetching and retrying (attempt $attempt)"
            sleep $((attempt * 3))
          done

      - name: Purge Cloudflare cache for /omni
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "no Cloudflare secrets; skipping purge (origin updated; CF catches up on TTL)"; exit 0
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" \
            --data '{"files":["https://hanxiao.io/omni/","https://hanxiao.io/omni/index.html","https://hanxiao.io/omni/faq.json","https://hanxiao.io/omni/assets/icon.png","https://hanxiao.io/omni/assets/og-image.png"]}' \
            && echo "purged Cloudflare cache for /omni" || echo "Cloudflare purge failed (non-fatal)"
