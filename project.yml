name: Omni
options:
  bundleIdPrefix: io.hanxiao
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  OmniKit:
    path: .

targets:
  Omni:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - package: OmniKit
        product: OmniKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.hanxiao.omni
        MARKETING_VERSION: "0.1.12"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sign with a stable Apple Development identity (not ad-hoc) so the code signature is
        # consistent across rebuilds. TCC then remembers the Documents/Downloads/Desktop grant
        # instead of re-prompting on every build.
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: MTECXQ97E6
        CODE_SIGNING_REQUIRED: YES
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Han Xiao"
        INFOPLIST_KEY_NSDocumentsFolderUsageDescription: "Omni indexes your Documents so you can search them by meaning."
        INFOPLIST_KEY_NSDownloadsFolderUsageDescription: "Omni indexes your Downloads so you can search them by meaning."
        INFOPLIST_KEY_NSDesktopFolderUsageDescription: "Omni indexes your Desktop so you can search them by meaning."
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
