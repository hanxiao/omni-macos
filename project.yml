name: Omni
options:
  bundleIdPrefix: ai.jina.omni
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  OmniKit:
    path: .

targets:
  Omni:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - package: OmniKit
        product: OmniKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.jina.omni
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSDocumentsFolderUsageDescription: "Omni indexes your Documents so you can search them by meaning."
        INFOPLIST_KEY_NSDownloadsFolderUsageDescription: "Omni indexes your Downloads so you can search them by meaning."
        INFOPLIST_KEY_NSDesktopFolderUsageDescription: "Omni indexes your Desktop so you can search them by meaning."
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
